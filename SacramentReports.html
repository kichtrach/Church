<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacrament Reports - CSI St. John's Church</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="sacrament-page">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="brand-icon"><i class="fa-solid fa-church"></i></div><div><h1>CSI St. John's Church</h1><p>Church Management System</p></div></div>
    <nav class="nav" id="navMenu"></nav>
    <div class="pastor-card" id="pastorCard"><div class="avatar"><img src="images/avatar.svg" alt="Rev. Michael"></div><div><strong>Rev. Michael</strong><span>Parish Priest</span></div><button class="small-arrow"><i class="fa-solid fa-chevron-down"></i></button></div>
  </aside>
  <main class="main" id="main">
    <header class="topbar">
      <div class="top-left"><button class="menu-btn" id="menuBtn" aria-label="Toggle menu"><span></span><span></span><span></span></button><div class="search-box"><input type="text" placeholder="Search families, members, records..."><span class="search-ico"><i class="fa-solid fa-magnifying-glass"></i></span></div></div>
      <div class="top-actions"><button class="icon-btn" id="calendarBtn" title="Calendar"></button><button class="icon-btn badge" id="notifyBtn" title="Notifications"><small>12</small></button><button class="profile-pill" id="profileBtn"><span class="profile-dot">PO</span><span class="profile-copy"><b>Parish Office</b><small>St. John's Church</small></span><span class="profile-caret" data-svg="down"></span></button></div>
    </header>
    <section class="content sacrament-content">
      <div class="events-titlebar">
        <div><h2>Sacrament Reports</h2><p><a href="ParishAdministration.html">Parish Administration</a><i class="fa-solid fa-chevron-right"></i><span>Sacrament Reports</span><i class="fa-solid fa-chevron-right"></i><span>All Sacraments</span></p></div>
        <div class="event-actions"><button class="outline-action" id="sacramentExport"><i class="fa-solid fa-arrow-up-from-bracket"></i> Export</button><button class="add-action" id="generateReport">Generate All Sacraments Report <i class="fa-solid fa-chevron-down"></i></button></div>
      </div>

      <section class="sacrament-overview card">
        <div class="sacrament-metrics" id="sacramentMetrics"></div>
        <div class="location-chart"><h3>By Location <small>(This Year)</small></h3><div class="chart-row"><canvas id="sacramentChart" width="160" height="160"></canvas><div id="locationLegend"></div></div></div>
      </section>

      <section class="sacrament-filters card">
        <label class="date-range-label">Date Range
          <div class="date-range-fields sac-date-range">
            <div class="date-input-wrap"><i class="fa-regular fa-calendar-days"></i><input type="date" id="sacramentStart" value="2025-01-01" aria-label="Start date"></div>
            <span class="range-sep">to</span>
            <div class="date-input-wrap"><i class="fa-regular fa-calendar-days"></i><input type="date" id="sacramentEnd" value="2025-12-31" aria-label="End date"></div>
          </div>
        </label>
        <label>Location <select id="sacramentLocation"><option>All Locations</option><option>Main Church</option><option>St. Peter’s Chapel</option><option>St. Mary’s Mission</option><option>Hill View Branch</option></select></label>
        <label>Sacrament Type <select id="sacramentType"><option>All</option><option>Baptism</option><option>Holy Communion</option><option>Confirmation</option><option>Marriage</option><option>Funeral</option></select></label>
        <label>Performed By <select id="sacramentBy"><option>All</option><option>Rev. Michael</option><option>Bishop John Samuel</option><option>Rev. Jacob</option></select></label>
        <button class="outline-action" id="sacramentFilter"><i class="fa-solid fa-filter"></i> Filter</button><button class="text-action" id="sacramentReset">Reset</button>
      </section>

      <section class="sacrament-table-card card">
        <div class="tabs sacrament-tabs" id="sacramentTabs"><button class="active">All Sacraments</button><button>Baptisms</button><button>Holy Communions</button><button>Confirmations</button><button>Marriages</button><button>Funerals</button></div>
        <div class="table-toolbar"><h3>All Sacrament Records <span id="recordCount">(171)</span></h3><div><span>View:</span><button class="mini-btn active" id="sacramentListView" type="button" title="List view"><i class="fa-solid fa-list"></i></button><button class="mini-btn" id="sacramentGridView" type="button" title="Grid view"><i class="fa-solid fa-border-all"></i></button><button class="mini-btn" id="downloadSacrament"><i class="fa-solid fa-download"></i></button></div></div>
        <div class="table-wrap"><table class="sacrament-table" id="sacramentTable"></table></div>
        <div class="table-footer"><span id="sacramentShowing">Showing 1 to 10 of 171 records</span><div class="pager"><button><i class="fa-solid fa-chevron-left"></i></button><button class="active">1</button><button>2</button><button>3</button><button>...</button><button>18</button><button><i class="fa-solid fa-chevron-right"></i></button></div><label>Rows per page: <select><option>10</option><option>25</option></select></label></div>
      </section>
    </section>
  </main>
  <div class="overlay" id="overlay"></div>
  <div class="modal" id="modal"><div class="modal-box"><button class="modal-close" id="modalClose">×</button><div id="modalContent"></div></div></div>
  <div class="dropdown-panel" id="dropdownPanel"></div>
  <script src="js/script.js"></script>
</body>
</html>
